global
    maxconn 4096

defaults
    mode http
    option dontlognull
    timeout connect 1s
    timeout client  15s
    timeout server  15s
    option http-keep-alive

frontend http
    bind :9999
    default_backend apis

backend apis
    balance roundrobin
    option http-keep-alive
    server api1 api1:8080 check maxconn 1024
    server api2 api2:8080 check maxconn 1024

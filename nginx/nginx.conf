worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log off;
    keepalive_timeout 65;

    upstream fraud_backend {
        server api1:8080;
        server api2:8080;
        keepalive 32;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://fraud_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }
    }
}
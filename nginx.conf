worker_processes auto;
worker_rlimit_nofile 65535; # Aumentado para suportar mais conexões simultâneas

events {
    worker_connections 16384; # Valor maior para evitar gargalo de descritores
    use epoll;
    multi_accept on; # Ativado conforme sugestão para aceitar várias conexões de vez
}

http {
    access_log off;
    sendfile on;
    tcp_nopush off; # Desativado conforme sugestão para reduzir latência em pacotes pequenos
    tcp_nodelay on;
    
    keepalive_timeout 65; # Aumentado levemente para manter conexões do cliente estáveis
    keepalive_requests 10000; # Sugestão aplicada: evita o handshake constante

    upstream fraud_backend {
        least_conn;
        server api1:8080;
        server api2:8080;
        keepalive 300; # Sugestão aplicada: mantém conexões abertas com o upstream
    }

    server {
        listen 9999 reuseport;

        location / {
            proxy_buffering off;
            proxy_pass http://fraud_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Necessário para o keepalive do upstream funcionar
            proxy_set_header Host $host;

            # Sugestão aplicada: keepalive a nível de socket
            proxy_socket_keepalive on;

            proxy_connect_timeout 1s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }
    }
}

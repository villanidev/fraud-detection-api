services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30MB"

  api1:
    image: villanidev/rinha-de-backend-2026:20260504025938
    environment:
      APP_VECTOR__SEARCH_INDEX: ivf_pq
      APP_VECTOR__SEARCH_NPROBE: "12"
      APP_VECTOR__SEARCH_NPROBE__GRAY: "8"
      APP_VECTOR__SEARCH_CANDIDATES: "50"
      APP_VECTOR__SEARCH_RERANK: "false"
      APP_FRAUD_DEBUG: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: villanidev/rinha-de-backend-2026:20260504025938
    environment:
      APP_VECTOR__SEARCH_INDEX: ivf_pq
      APP_VECTOR__SEARCH_NPROBE: "12"
      APP_VECTOR__SEARCH_NPROBE__GRAY: "8"
      APP_VECTOR__SEARCH_CANDIDATES: "50"
      APP_VECTOR__SEARCH_RERANK: "false"
      APP_FRAUD_DEBUG: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

networks:
  rinha:
    driver: bridge

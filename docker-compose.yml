services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "40MB"

  api1:
    image: villanidev/rinha-de-backend-2026:latest
    environment:
      APP_VECTOR__SEARCH_INDEX: ivf_pq
      APP_VECTOR__SEARCH_NPROBE: "32"
      APP_VECTOR__SEARCH_CANDIDATES: "50"
      APP_VECTOR__SEARCH_RERANK: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "155MB"

  api2:
    image: villanidev/rinha-de-backend-2026:latest
    environment:
      APP_VECTOR__SEARCH_INDEX: ivf_pq
      APP_VECTOR__SEARCH_NPROBE: "32"
      APP_VECTOR__SEARCH_CANDIDATES: "50"
      APP_VECTOR__SEARCH_RERANK: "false"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "155MB"

networks:
  rinha:
    driver: bridge

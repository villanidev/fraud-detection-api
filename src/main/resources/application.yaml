# Properties que estavam nos exemplos do Helidon kkk
declarative:
  ignore-incubating: true

# Properties do Helidon WebServer
server:
  port: 8080
  host: 0.0.0.0

# Properties customizadas
app:
  vector-search:
    index: "ivf_pq" #"brute_force"
    clusters: 4096
    nprobe: 16
    candidates: 10
    rerank:
      enabled: true
      nprobe: 16
      candidates: 10
  fraud:
    debug: false

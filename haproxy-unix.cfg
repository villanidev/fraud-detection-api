global
    maxconn 4096
    log stdout format raw local0 info

defaults
    mode tcp
    log global
    option tcplog
    timeout connect 1s
    timeout client  30s
    timeout server  30s

frontend http
    bind :9999
    mode tcp
    default_backend apis

backend apis
    mode tcp
    balance roundrobin
    server api1 unix@/sockets/api1.sock
    server api2 unix@/sockets/api2.sock
